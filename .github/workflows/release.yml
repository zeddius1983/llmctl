name: Release

# Create the GitHub Release for a pushed `v*` tag, then build prebuilt Linux
# binaries and attach them to it. Can also be run manually from the Actions tab
# against an existing tag (use the ref selector) to (re)produce its artifacts —
# note this recreates the release, so re-apply any hand-edited notes after.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # required to create the release and upload assets

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/create-gh-release-action@v1
        with:
          title: llmctl $tag
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # Dynamically linked against the host glibc.
          - x86_64-unknown-linux-gnu
          # Fully static, no glibc version dependency — runs on any Linux.
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v5
      - name: Build and upload ${{ matrix.target }}
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: llmctl
          target: ${{ matrix.target }}
          # Archive name, e.g. llmctl-v0.1.0-x86_64-unknown-linux-musl.tar.gz
          archive: $bin-$tag-$target
          tar: unix
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
